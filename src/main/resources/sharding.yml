rules:
  - !SHARDING
    tables:
      user:
        actualDataNodes: ds_0.user_${2023..2080}
        tableStrategy:
          standard:
            shardingColumn: create_time
            shardingAlgorithmName: user_interval
    shardingAlgorithms:
      user_interval:
        type: INTERVAL
        props:
          datetime-pattern: "yyyy-MM-dd HH:mm:ss"
          datetime-lower: "2023-01-01 00:00:00"
          datetime-upper: "2080-01-01 00:00:00"
          sharding-suffix-pattern: "yyyy"
          datetime-interval-amount: "1"
          datetime-interval-unit: "YEARS"
props:
  sql-show: true
  # 如果表还未创建，仍然需要关闭校验或者提前建表